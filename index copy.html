<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ryan Flanagan — General Contractor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f6f5f2;
      --text: #1a1a18;
      --muted: #8c8a84;
      --border: #dedad4;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-weight: 300;
      background: var(--bg);
      color: var(--text);
      line-height: 1.65;
    }

    header {
      padding: 72px 48px 60px;
      max-width: 1100px;
      margin: 0 auto;
    }

    .name {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 300;
      font-size: clamp(38px, 6vw, 68px);
      letter-spacing: 0.01em;
      line-height: 1;
      margin-bottom: 28px;
    }

    .condemned {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(20px, 2.8vw, 28px);
      font-weight: 400;
      font-style: italic;
      color: var(--muted);
      margin-bottom: 32px;
      line-height: 1.3;
    }

    .phone {
      font-size: 14px;
      font-weight: 300;
      letter-spacing: 0.1em;
      color: var(--text);
    }

    hr {
      border: none;
      border-top: 1px solid var(--border);
      max-width: 1100px;
      margin: 0 auto;
    }

    .photos {
      max-width: 1100px;
      margin: 0 auto;
      padding: 48px 48px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .photo-wrap {
      position: relative;
      background: #d8d5cf;
      aspect-ratio: 4/3;
      overflow: hidden;
    }

    .photo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .photo-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #b0ada7;
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .photo-caption {
      position: absolute;
      bottom: 14px;
      left: 14px;
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.75);
    }

    .form-section {
      max-width: 640px;
      margin: 0 auto;
      padding: 56px 48px 88px;
    }

    .form-heading {
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px;
      font-weight: 300;
      color: var(--muted);
      margin-bottom: 28px;
      letter-spacing: 0.02em;
    }

    .form-section iframe {
      width: 100%;
      border: none;
      min-height: 680px;
    }

    footer {
      border-top: 1px solid var(--border);
      text-align: center;
      padding: 28px;
      font-size: 11px;
      letter-spacing: 0.08em;
      color: var(--muted);
      text-transform: uppercase;
    }

    @media (max-width: 600px) {
      header { padding: 48px 24px 40px; }
      .photos { padding: 32px 24px; gap: 12px; }
      .form-section { padding: 40px 24px 64px; }
    }
  </style>
</head>
<body>

  <header>
    <h1 class="name">Ryan Flanagan</h1>
    <p class="condemned">This home was condemned in 2024.</p>
    <p class="phone">(608) 333-7145</p>
  </header>

  <hr>

  <div class="photos">
    <div class="photo-wrap">
      <img src="images/before.jpg" alt="Before" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';" />
      <div class="photo-placeholder" style="display:none;">Before</div>
      <span class="photo-caption">Before</span>
    </div>
    <div class="photo-wrap">
      <img src="images/after.jpg" alt="After" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';" />
      <div class="photo-placeholder" style="display:none;">After</div>
      <span class="photo-caption">After</span>
    </div>
  </div>

  <hr>

  <div class="form-section">
    <p class="form-heading">Get in touch</p>
    <iframe
      src="https://forms.gle/u9Rh99xYKrN96Kjq9"
      title="Project inquiry form"
      loading="lazy"
    >Loading form…</iframe>
  </div>

  <footer>
    Ryan Flanagan &nbsp;·&nbsp; General Contractor
  </footer>

</body>
</html>
